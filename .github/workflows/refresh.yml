name: Daily Data Refresh

on:
  schedule:
    # 22:00 UTC weekdays = ~3 hours after US close, parquets ready overnight in Dubai
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}        # also let you fire it manually from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write          # needed to commit back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh
        env:
          # EIA_API_KEY: ${{ secrets.EIA_API_KEY }}   # uncomment after you add this secret in GitHub
          PYTHONUNBUFFERED: "1"
        run: python refresh.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.parquet
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "auto: daily data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
